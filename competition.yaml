version: 2
title: Codabench Dummy Challenge
description: A minimal dummy challenge to understand the Codabench workflow.
image: images/logo.png
terms: pages/terms.md
registration_auto_approve: True
docker_image: codalab/codalab-legacy:py37
make_programs_available: True
make_input_data_available: True
auto_run_submissions: True
enable_detailed_results: False
show_detailed_results_in_submission_panel: True
show_detailed_results_in_leaderboard: True
contact_email: nacer.nasri@uni-wuppertal.de

pages:
  - title: Overview
    file: pages/overview.md
  - title: Tutorial
    file: pages/tutorial.md
  - title: Terms
    file: pages/terms.md

phases:
  - index: 0
    name: Dummy Phase
    description: Submit a prediction.txt file containing one number.
    start: 2026-06-24 00:00:00
    tasks:
      - 0

tasks:
  - index: 0
    name: Guess the Number
    description: The submitted number is compared against a reference number.
    scoring_program: bundles/scoring_program.zip
    reference_data: bundles/reference_data.zip

solutions:
  - index: 0
    path: bundles/sample_result_submission.zip
    tasks:
      - 0

leaderboards:
  - title: Results
    key: main
    columns:
      - title: Score
        key: score
        index: 0
        sorting: desc
        precision: 2
      - title: Error
        key: error
        index: 1
        sorting: asc
        precision: 2